name: jetgp
channels:
  - conda-forge
dependencies:
  - python=3.9
  - mauriaristi::pyoti
  - ipython
  - jupyter_sphinx
  - numpy
  - scipy
  - sphinx >=7.1
  - sphinx-argparse
  - sphinx-book-theme
  - sphinx-copybutton >=0.5.1
  - sphinx-design
  - sphinx_rtd_theme >=3
  - sphinxcontrib-bibtex
  - sympy
  - line_profiler
  - pip
  - pip:
    - torch
    - scikit-learn
    - pytest
    - pytest-cov